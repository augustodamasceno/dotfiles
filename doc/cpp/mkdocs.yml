site_name: Project Documentation
site_description: Description
site_author: Maintainer

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables

nav:
  - Home: index.md
  - API Reference:
    - Annotated: example/annotated.md
    - Classes: example/classes.md
    - Files: example/files.md
    - Functions: example/functions.md
    - Namespaces: example/namespaces.md

plugins:
  - search
  - mkdoxy:
      projects:
        example:
          src-dirs: "include/"
          full-doc: True
          doxy-cfg:
            EXTRACT_ALL: YES
            EXTRACT_PRIVATE: NO
            EXTRACT_STATIC: YES
            RECURSIVE: YES
      