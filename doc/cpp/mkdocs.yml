site_name: Project Documentation
site_description: Description
site_author: Maintainer
site_url: https://augustodamasceno.org/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - tables

nav:
  - Home: index.md
  - API Reference:
    - Summary: example/annotated.md
    - Classes:
      - All Classes: example/classes.md
      - Class Hierarchy: example/hierarchy.md
      - Class Members: example/class_members.md
      - Member Functions: example/class_member_functions.md
      - Member Variables: example/class_member_variables.md
      - Member Typedefs: example/class_member_typedefs.md
      - Member Enums: example/class_member_enums.md
    - Files:
      - All Files: example/files.md
    - Functions: example/functions.md
    - Variables: example/variables.md
    - Macros: example/macros.md
    - Namespaces:
      - All Namespaces: example/namespaces.md
      - Namespace Members: example/namespace_members.md
      - Member Functions: example/namespace_member_functions.md
      - Member Variables: example/namespace_member_variables.md
      - Member Typedefs: example/namespace_member_typedefs.md
      - Member Enums: example/namespace_member_enums.md
    - Modules: example/modules.md
    - Pages: example/pages.md

plugins:
  - search
  - llmstxt:
      sections:
        Guides:
          - index.md
        API Reference:
          - example/annotated.md
          - example/classes.md
          - example/files.md
          - example/functions.md
          - example/namespaces.md
          - example/hierarchy.md
          - example/class_members.md
          - example/class_member_functions.md
          - example/class_member_variables.md
          - example/class_member_typedefs.md
          - example/class_member_enums.md
          - example/namespace_members.md
          - example/namespace_member_functions.md
          - example/namespace_member_variables.md
          - example/namespace_member_typedefs.md
          - example/namespace_member_enums.md
          - example/variables.md
          - example/macros.md
          - example/modules.md
          - example/pages.md
  - mkdoxy:
      # doxygen-bin-path: Windows default install path.
      # Replace with the correct path for your OS:
      #   Linux / FreeBSD : /usr/bin/doxygen
      #   macOS (Homebrew): /opt/homebrew/bin/doxygen
      doxygen-bin-path: "C:\\Program Files\\doxygen\\bin\\doxygen.exe"
      # save-api: persist generated .md files to this directory after build.
      # Without this, markdown is written inside site/ and lost on the next build.
      save-api: "docs/"
      projects:
        example:
          src-dirs: "include/"
          full-doc: True
          doxy-cfg:
            EXTRACT_ALL: YES
            EXTRACT_PRIVATE: NO
            EXTRACT_STATIC: YES
            RECURSIVE: YES
      