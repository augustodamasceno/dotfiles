name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'include/**'
      - 'docs/**'
      - 'mkdocs.yml'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install MkDocs, the Material theme, mkdoxy, and mkdocs-llmstxt
      - name: Install Python Dependencies
        run: pip install mkdocs-material mkdoxy mkdocs-llmstxt

      # Replace Windows doxygen path with the Linux binary path
      - name: Set Doxygen path for Linux
        run: sed -i "s|doxygen-bin-path:.*|doxygen-bin-path: \"$(which doxygen)\"|" mkdocs.yml

      # mkdoxy calls Doxygen internally during site generation
      - name: Deploy MkDocs to GitHub Pages
        run: mkdocs gh-deploy --force